[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kanibako-agent-claude"
version = "1.0.5"
description = "Claude Code target plugin for kanibako"
requires-python = ">=3.11"
dependencies = ["kanibako-base"]

[project.entry-points."kanibako.targets"]
claude = "kanibako.plugins.claude:ClaudeTarget"

[tool.setuptools.packages.find]
where = ["src"]
include = ["kanibako.plugins.claude*"]

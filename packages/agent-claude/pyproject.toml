[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kanibako-agent-claude"
version = "1.4.0"
description = "Claude Code target plugin for kanibako"
requires-python = ">=3.11"
dependencies = ["kanibako-cli"]

[project.entry-points."kanibako.agents"]
claude = "kanibako.plugins.claude:ClaudeTarget"

[tool.setuptools.packages.find]
where = ["src"]
include = ["kanibako.plugins.claude*"]

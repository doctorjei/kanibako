[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kanibako"
version = "1.0.5"
description = "Run AI coding agents in rootless containers (meta-package: base + Claude plugin)"
requires-python = ">=3.11"
dependencies = [
    "kanibako-base>=1.0.5,<2.0",
    "kanibako-agent-claude>=1.0.5,<2.0",
]

[project.scripts]
kanibako = "kanibako.cli:main"

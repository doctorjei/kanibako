name: Tests

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run e2e job (normally tag-gated)'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]' -e packages/agent-claude/
      - run: ruff check src/ tests/ packages/
      - run: mypy src/kanibako/
      - run: pytest tests/ -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]' -e packages/agent-claude/
      - run: pytest -m integration tests/ -v

  e2e:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install tmux + fuse-overlayfs
        # fuse-overlayfs lets rootless podman use the overlay driver
        # instead of the much slower vfs fallback. Without it,
        # `--userns=keep-id` (used by kanibako) hits "creating an ID-
        # mapped copy of layer" errors on ubuntu-latest runners.
        run: sudo apt-get install -y tmux fuse-overlayfs
      - name: Install kanibako
        run: pip install -e '.[dev]' -e packages/agent-claude/
      - name: Pull e2e image (with build fallback)
        run: |
          # Images are published from main on every containers/** change,
          # so :latest always reflects current main. Just pull. Fall back
          # to a local build only if the registry is unreachable.
          podman pull ghcr.io/doctorjei/kanibako-oci:latest \
            && podman tag ghcr.io/doctorjei/kanibako-oci:latest kanibako-oci:latest \
            || podman build \
                 --build-arg BASE_IMAGE=ghcr.io/doctorjei/droste-fiber:1.1.0 \
                 --build-arg VARIANT=oci \
                 -t kanibako-oci:latest \
                 -f src/kanibako/containers/Containerfile.kanibako .
      - name: Run e2e tests
        # Explicit `-m e2e` because pyproject.toml's default addopts
        # is `-m 'not integration and not e2e'` — without overriding,
        # the suite would collect 0 tests and exit 5.
        run: pytest -m e2e tests/e2e/ -v

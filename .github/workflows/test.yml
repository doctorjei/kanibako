name: Tests

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]' -e packages/agent-claude/
      - run: ruff check src/ tests/ packages/
      - run: mypy src/kanibako/
      - run: pytest tests/ -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[dev]' -e packages/agent-claude/
      - run: pytest -m integration tests/ -v

  e2e:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install tmux
        run: sudo apt-get install -y tmux
      - name: Install kanibako
        run: pip install -e '.[dev]' -e packages/agent-claude/
      - name: Pull or build image
        run: |
          # For minor releases (x.y.0), build from Containerfile
          TAG="${GITHUB_REF#refs/tags/v}"
          PATCH="${TAG##*.}"
          if [ "$PATCH" = "0" ]; then
            echo "Minor release — building image from Containerfile"
            podman build -t kanibako-oci:latest -f containers/Containerfile.kanibako .
          else
            echo "Patch release — pulling cached image"
            podman pull ghcr.io/doctorjei/kanibako-oci:latest || \
              podman build -t kanibako-oci:latest -f containers/Containerfile.kanibako .
          fi
      - name: Run e2e tests
        run: pytest tests/e2e/ -v

name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'src/kanibako/containers/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - variant: min
            base: ghcr.io/doctorjei/droste-seed:1.1.0
          - variant: oci
            base: ghcr.io/doctorjei/droste-fiber:1.1.0
          - variant: lxc
            base: ghcr.io/doctorjei/droste-thread:1.1.0
          - variant: vm
            base: ghcr.io/doctorjei/droste-hair:1.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push kanibako-${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: src/kanibako/containers/
          file: src/kanibako/containers/Containerfile.kanibako
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-${{ matrix.variant }}:latest
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  build-templates:
    needs: [build-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        template: [jvm, systems]
        variant: [min, oci, lxc, vm]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push kanibako-template-${{ matrix.template }}-${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: src/kanibako/containers/
          file: src/kanibako/containers/Containerfile.${{ matrix.template }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-template-${{ matrix.template }}-${{ matrix.variant }}:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-${{ matrix.variant }}:latest
          cache-from: type=gha,scope=template-${{ matrix.template }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=template-${{ matrix.template }}-${{ matrix.variant }}

name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'src/kanibako/containers/**'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push built images to GHCR (off = build-only test)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - variant: min
            base: ghcr.io/doctorjei/droste-seed:1.1.0
          - variant: oci
            base: ghcr.io/doctorjei/droste-fiber:1.1.0
          - variant: lxc
            base: ghcr.io/doctorjei/droste-thread:1.1.0
          - variant: vm
            base: ghcr.io/doctorjei/droste-hair:1.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push kanibako-${{ matrix.variant }}
        uses: docker/build-push-action@v7
        with:
          context: src/kanibako/containers/
          file: src/kanibako/containers/Containerfile.kanibako
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-${{ matrix.variant }}:edge
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  discover-templates:
    # Enumerate bundled Containerfile.template-<name> files into a JSON array so
    # the build-templates matrix tracks the shipped templates automatically.
    # Adding a Containerfile.template-<name> is all it takes to get it built.
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.list.outputs.templates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: List bundled templates
        id: list
        run: |
          json=$(find src/kanibako/containers -maxdepth 1 \
            -name 'Containerfile.template-*' -printf '%f\n' \
            | sed 's/^Containerfile\.template-//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0)) | sort')
          echo "templates=$json" >> "$GITHUB_OUTPUT"
          echo "Discovered templates: $json"

  build-templates:
    needs: [build-base, discover-templates]
    # Runs on push and on ANY dispatch. Templates FROM the base image in GHCR;
    # a build-only dispatch (inputs.push=false) layers on the already-published
    # kanibako-<variant>:latest base to verify the template Containerfiles build
    # without publishing anything (the per-step push: gate below stays off).
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        template: ${{ fromJSON(needs.discover-templates.outputs.templates) }}
        variant: [min, oci, lxc, vm]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push kanibako-template-${{ matrix.template }}-${{ matrix.variant }}
        uses: docker/build-push-action@v7
        with:
          context: src/kanibako/containers/
          file: src/kanibako/containers/Containerfile.template-${{ matrix.template }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-template-${{ matrix.template }}-${{ matrix.variant }}:latest
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/kanibako-${{ matrix.variant }}:latest
          cache-from: type=gha,scope=template-${{ matrix.template }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=template-${{ matrix.template }}-${{ matrix.variant }}

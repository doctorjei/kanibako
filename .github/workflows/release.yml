name: Release

# rc-then-promote release pipeline. One git tag drives a release with
# tested-bits == shipped-bits.
#
#   * rc tag    v<ver>-rc<n>  (e.g. v1.2.5-rc1)
#       validates the PyPI packages (no upload) and creates a DRAFT
#       prerelease. Nothing touches prod PyPI.
#
#   * release tag  v<ver>     (e.g. v1.2.5)
#       builds + publishes the PyPI packages to prod (OIDC) and publishes
#       the GitHub release.
#
# Container images are built and published by the kanibako-images repo,
# not here.
#
# Triggers on ALL v* tags and self-gates by job `if`. No paths: filters.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload the dev build to PyPI (else build + twine-check only)'
        type: boolean
        default: false

permissions:
  contents: write    # gh release
  id-token: write    # PyPI OIDC

jobs:
  # ---------------------------------------------------------------------------
  # rc path: validate PyPI packages (no upload), draft a prerelease.
  # ---------------------------------------------------------------------------

  rc-pypi-check:
    name: rc - validate PyPI packages (no upload)
    if: ${{ contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag shape
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is malformed; expected v<MAJOR>.<MINOR>.<PATCH>[-rc<N>]." >&2
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build twine

      - name: Build all distributable packages
        # Mirrors scripts/build-all.sh's package list. agent-goose is
        # intentionally excluded (it versions independently at 0.1.0).
        run: |
          for pkg in . packages/agent-claude packages/meta; do
            python -m build "$pkg" --outdir "$PWD/dist"
          done

      - name: Check distributions (NO upload)
        run: twine check dist/*

  rc-release:
    name: rc - draft prerelease
    if: ${{ contains(github.ref_name, '-rc') }}
    needs: [rc-pypi-check]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Create draft prerelease
        # Guard so a re-run does not fail on an existing draft.
        run: |
          gh release view "$GITHUB_REF_NAME" \
            || gh release create "$GITHUB_REF_NAME" \
                 --draft \
                 --prerelease \
                 --generate-notes \
                 --target "$GITHUB_SHA" \
                 --title "$GITHUB_REF_NAME"

  # ---------------------------------------------------------------------------
  # release path: build + publish the PyPI packages, publish the GitHub release.
  # Container images are built and published by the kanibako-images repo.
  #
  # NOTE: the PyPI publish step requires a Trusted Publisher configured per
  # project on PyPI with: owner=doctorjei, repo=kanibako-cli, workflow=release.yml,
  # environment=pypi. Without it, the OIDC publish fails with invalid-publisher.
  # ---------------------------------------------------------------------------

  promote:
    name: Publish release
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Validate tag shape
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$GITHUB_REF_NAME' is malformed; expected v<MAJOR>.<MINOR>.<PATCH> (no -rc)." >&2
            exit 1
          fi
          echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build

      - name: Build all distributable packages
        # Mirrors scripts/build-all.sh's package list. agent-goose excluded.
        run: |
          for pkg in . packages/agent-claude packages/meta; do
            python -m build "$pkg" --outdir "$PWD/dist"
          done

      - name: Publish to PyPI
        # OIDC trusted publishing — no token. Default packages-dir is dist/.
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish GitHub release + tidy rc draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" \
            || gh release create "$GITHUB_REF_NAME" \
                 --generate-notes \
                 --title "$GITHUB_REF_NAME"
          # Tidy any matching rc draft prerelease(s) left from the rc path.
          for rc in $(gh release list --json tagName --jq \
                ".[] | select(.tagName | startswith(\"${GITHUB_REF_NAME}-rc\")) | .tagName"); do
            gh release delete "$rc" --yes || true
          done

  # ---------------------------------------------------------------------------
  # dev path: on-demand (workflow_dispatch) .dev pre-release of the three PyPI
  # packages. Build + twine-check always; upload only when `publish` is true.
  # Shares this workflow file (and its env `pypi`) so the existing Trusted
  # Publisher applies. The official tag-driven rc->promote flow is untouched.
  # ---------------------------------------------------------------------------

  dev:
    name: dev - build (+ optional publish) a .dev pre-release
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tooling
        run: pip install build twine

      - name: Compute dev version
        # Base = repo version with any pre-release suffix stripped; serial =
        # the run number (monotonic, unique on PyPI).
        run: |
          BASE=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          BASE=${BASE%%.dev*}
          DEV="${BASE}.dev${{ github.run_number }}"
          echo "DEV_VERSION=$DEV" >> "$GITHUB_ENV"
          echo "Building dev version: $DEV"

      - name: Stamp dev version (no commit)
        # Anchored sed on the package version lines only — NOT bump2version,
        # whose default serialize can't represent a .devN suffix and corrupts
        # the file. `^version = "..."` / `^__version__ = "..."` never match the
        # indented dependency lines, so dep floors stay intact.
        run: |
          for f in pyproject.toml packages/agent-claude/pyproject.toml packages/meta/pyproject.toml; do
            sed -i -E "s/^version = \"[^\"]+\"/version = \"$DEV_VERSION\"/" "$f"
          done
          for f in src/kanibako/__init__.py packages/agent-claude/src/kanibako/plugins/claude/__init__.py; do
            sed -i -E "s/^__version__ = \"[^\"]+\"/__version__ = \"$DEV_VERSION\"/" "$f"
          done
          echo "Stamped version $DEV_VERSION:"
          grep -n '^version = ' pyproject.toml packages/*/pyproject.toml

      - name: Build all distributable packages
        # Same package list as the official path; agent-goose excluded (independent).
        run: |
          for pkg in . packages/agent-claude packages/meta; do
            python -m build "$pkg" --outdir "$PWD/dist"
          done

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI (dev pre-release)
        # OIDC trusted publishing via the same release.yml Trusted Publisher.
        if: ${{ inputs.publish }}
        uses: pypa/gh-action-pypi-publish@release/v1

# kanibako default tmux configuration
# UTF-8 is handled via LANG=C.UTF-8 in the Containerfile.

# Mouse on — enables scroll within tmux panes and mouse selection
set -g mouse on

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer
set -g history-limit 50000
